<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋 — 人機對弈 | openai-tw.com</title>
  <meta name="description" content="五子棋人機對弈遊戲，支援三種難度與音效。先連五子者獲勝。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1020;
      --bg2: #0a1226;
      --panel: #121a2f;
      --line: #253252;
      --text: #e6edf3;
      --muted: #9fb0c3;
      --accent: #60a5fa;
      --gold: #d4a017;
      --wood: #c8a040;
      --wood-line: #a07830;
      --wood-shadow: #6b4f0f;
      --red: #c0392b;
    }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
    }

    /* ── top nav ── */
    .top-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 20px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid #35558d;
      background: linear-gradient(135deg, #132547 0%, #1c3563 100%);
      color: #dbeafe;
      font-weight: 800;
      font-size: 13px;
      text-decoration: none;
    }

    .back-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: var(--accent); border-color: var(--accent); }

    /* ── main layout ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    /* ── game container ── */
    #gomoku-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      background: linear-gradient(160deg, #2c1810 0%, #1a0e08 60%, #0f0804 100%);
      border-radius: 16px;
      border: 1px solid rgba(200,169,110,0.15);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      width: fit-content;
      max-width: 100%;
    }

    #gomoku-app::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8a96e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .game-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 2px 10px rgba(212,160,23,0.4);
      letter-spacing: 0.2em;
      margin-bottom: 0.25rem;
      position: relative;
      z-index: 2;
    }

    .game-subtitle {
      font-size: 0.7rem;
      color: rgba(200,169,110,0.55);
      letter-spacing: 0.35em;
      margin-bottom: 1.2rem;
      position: relative;
      z-index: 2;
    }

    .difficulty-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      position: relative;
      z-index: 2;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-label {
      font-size: 0.7rem;
      color: rgba(200,169,110,0.6);
      letter-spacing: 0.1em;
    }

    .diff-btn {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      padding: 0.28rem 0.8rem;
      border-radius: 5px;
      border: 1px solid rgba(200,169,110,0.25);
      background: transparent;
      color: rgba(200,169,110,0.5);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .diff-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(212,160,23,0.1);
    }

    .sound-btn {
      font-size: 0.8rem;
      padding: 0.28rem 0.7rem;
      border-radius: 5px;
      border: 1px solid rgba(200,169,110,0.25);
      background: transparent;
      color: rgba(200,169,110,0.5);
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .sound-btn.active {
      border-color: rgba(200,169,110,0.6);
      color: rgba(200,169,110,0.9);
    }

    /* ── status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
      z-index: 2;
    }

    .player-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 0.55rem 1.1rem;
      border-radius: 10px;
      border: 1px solid rgba(200,169,110,0.15);
      background: rgba(0,0,0,0.3);
      transition: all 0.3s;
      min-width: 85px;
    }
    .player-indicator.active {
      border-color: var(--gold);
      background: rgba(212,160,23,0.1);
      box-shadow: 0 0 16px rgba(212,160,23,0.18);
    }

    .player-stone {
      width: 26px; height: 26px;
      border-radius: 50%;
    }
    .player-stone.black {
      background: radial-gradient(circle at 35% 30%, #555, #111);
      box-shadow: 2px 3px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.15);
    }
    .player-stone.white {
      background: radial-gradient(circle at 35% 30%, #fff, #d8d4c0);
      box-shadow: 2px 3px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.8);
    }

    .player-name { font-size: 0.8rem; font-weight: 500; color: var(--gold); }
    .player-label { font-size: 0.62rem; color: rgba(200,169,110,0.6); letter-spacing: 0.08em; }
    .vs-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: rgba(200,169,110,0.4);
    }

    /* ── board ── */
    .board-wrapper {
      position: relative;
      z-index: 2;
      padding: 18px;
      background: linear-gradient(145deg, #c8a050, #a07020, #c8a050);
      border-radius: 8px;
      box-shadow: 0 0 0 2px #6b4010, 0 8px 32px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.2);
    }

    #board {
      display: grid;
      background: #c8a040;
      position: relative;
      cursor: pointer;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
    }

    .board-cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board-cell::before {
      content: '';
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 1px;
      background: var(--wood-line);
      opacity: 0.8;
    }
    .board-cell::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--wood-line);
      opacity: 0.8;
    }
    .board-cell.edge-left::before  { left: 50%; width: 50%; }
    .board-cell.edge-right::before { left: 0; width: 50%; }
    .board-cell.edge-top::after    { top: 50%; height: 50%; }
    .board-cell.edge-bottom::after { top: 0; height: 50%; }

    .star-point {
      position: absolute;
      width: 7px; height: 7px;
      background: var(--wood-shadow);
      border-radius: 50%;
      z-index: 1;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .stone {
      width: 88%; height: 88%;
      border-radius: 50%;
      position: relative;
      z-index: 3;
      animation: placeStone 0.18s cubic-bezier(0.2, 0.8, 0.4, 1.2);
      pointer-events: none;
    }
    @keyframes placeStone {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .stone.black {
      background: radial-gradient(circle at 35% 30%, #555, #111);
      box-shadow: 2px 4px 8px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.2);
    }
    .stone.white {
      background: radial-gradient(circle at 35% 28%, #fff, #d8d4c0);
      box-shadow: 2px 4px 8px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.9);
    }
    .stone.winning {
      animation: winPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes winPulse {
      from { box-shadow: 2px 4px 8px rgba(0,0,0,0.7), 0 0 0 2px var(--red); }
      to   { box-shadow: 2px 4px 8px rgba(0,0,0,0.7), 0 0 12px 4px var(--red); }
    }

    .hover-preview {
      width: 88%; height: 88%;
      border-radius: 50%;
      position: absolute;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .hover-preview.black { background: radial-gradient(circle at 35% 30%, #555, #111); }
    .hover-preview.white { background: radial-gradient(circle at 35% 28%, #fff, #d8d4c0); }
    .board-cell:hover .hover-preview { opacity: 0.4; }

    /* ── message & controls ── */
    .message-box {
      margin-top: 0.9rem;
      padding: 0.55rem 1.5rem;
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(200,169,110,0.2);
      font-size: 0.85rem;
      color: rgba(200,169,110,0.9);
      letter-spacing: 0.05em;
      min-height: 36px;
      text-align: center;
      position: relative;
      z-index: 2;
      transition: all 0.3s;
    }
    .message-box.win {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(212,160,23,0.08);
      font-weight: 500;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
      position: relative;
      z-index: 2;
    }

    .btn {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      border: 1px solid rgba(200,169,110,0.35);
      background: rgba(200,169,110,0.08);
      color: var(--gold);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(200,169,110,0.18); border-color: var(--gold); }
    .btn:active { transform: scale(0.97); }
    .btn.danger { border-color: rgba(192,57,43,0.45); color: #e74c3c; }
    .btn.danger:hover { background: rgba(192,57,43,0.12); border-color: #e74c3c; }

    .thinking-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      color: var(--gold);
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.4s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.8s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* ── rules section ── */
    .rules {
      margin-top: 2rem;
      max-width: 560px;
      width: 100%;
      padding: 0 1rem;
    }
    .rules h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
      font-weight: 400;
    }
    .rules ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .rules li {
      font-size: 0.8rem;
      color: rgba(150,170,200,0.7);
      padding-left: 1.2em;
      position: relative;
      line-height: 1.6;
    }
    .rules li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: rgba(212,160,23,0.5);
    }

    /* responsive */
    @media (max-width: 600px) {
      .board-wrapper { padding: 12px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="logo" href="/">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    openai-tw.com
  </a>
  <a class="back-link" href="/">← 返回首頁</a>
</div>

<div class="main">
  <div id="gomoku-app">
    <div class="game-title">五子棋</div>
    <div class="game-subtitle">GOMOKU · 人機對弈</div>

    <div class="difficulty-row">
      <span class="diff-label">難度：</span>
      <button class="diff-btn" onclick="setDifficulty(1)">初學</button>
      <button class="diff-btn active" onclick="setDifficulty(2)">普通</button>
      <button class="diff-btn" onclick="setDifficulty(3)">困難</button>
      <button class="sound-btn active" id="soundBtn" onclick="toggleSound()" title="音效開關">🔊</button>
    </div>

    <div class="status-bar">
      <div class="player-indicator active" id="p1">
        <div class="player-stone black"></div>
        <div class="player-name">玩家</div>
        <div class="player-label">黑棋先手</div>
      </div>
      <div class="vs-text">VS</div>
      <div class="player-indicator" id="p2">
        <div class="player-stone white"></div>
        <div class="player-name">AI</div>
        <div class="player-label">白棋</div>
      </div>
    </div>

    <div class="board-wrapper">
      <div id="board"></div>
    </div>

    <div class="message-box" id="msg">您先下，請點擊棋盤落子</div>

    <div class="controls">
      <button class="btn" onclick="undoMove()">悔棋</button>
      <button class="btn danger" onclick="resetGame()">重新開始</button>
    </div>
  </div>

  <div class="rules">
    <h2>遊戲說明</h2>
    <ul>
      <li>玩家執黑棋，AI 執白棋，黑棋先手</li>
      <li>先在橫、直或斜方向連成五子者獲勝</li>
      <li>可選擇初學、普通、困難三種 AI 難度</li>
      <li>點擊「悔棋」可撤回最後一步（含 AI 的回應）</li>
      <li>點擊 🔊 可切換音效開關</li>
    </ul>
  </div>
</div>

<script>
const SIZE = 15;
const CELL = 36;
let board = [], gameOver = false, aiThinking = false;
let soundEnabled = true, difficulty = 2;
let moveHistory = [], winCells = [];
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);

    if (type === 'black') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, now);
      osc.frequency.exponentialRampToValueAtTime(180, now + 0.12);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'white') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
      osc.start(now); osc.stop(now + 0.13);
    } else if (type === 'win') {
      [0, 0.15, 0.3, 0.5].forEach((delay, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime([523, 659, 784, 1047][i], now + delay);
        g.gain.setValueAtTime(0.3, now + delay);
        g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.25);
        o.start(now + delay); o.stop(now + delay + 0.25);
      });
    } else if (type === 'lose') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.5);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
    } else if (type === 'invalid') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now); osc.stop(now + 0.08);
    }
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('active', soundEnabled);
}

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === d));
  resetGame();
}

function initBoard() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  gameOver = false; aiThinking = false; moveHistory = []; winCells = [];
}

function renderBoard() {
  const el = document.getElementById('board');
  const cell = Math.min(CELL, Math.floor((window.innerWidth - 80) / SIZE));
  el.style.gridTemplateColumns = `repeat(${SIZE}, ${cell}px)`;
  el.style.gridTemplateRows    = `repeat(${SIZE}, ${cell}px)`;
  el.style.width  = SIZE * cell + 'px';
  el.style.height = SIZE * cell + 'px';
  el.innerHTML = '';

  const starPoints = [[3,3],[3,11],[11,3],[11,11],[7,7],[3,7],[7,3],[11,7],[7,11]];

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const div = document.createElement('div');
      div.className = 'board-cell';
      if (r === 0)        div.classList.add('edge-top');
      if (r === SIZE - 1) div.classList.add('edge-bottom');
      if (c === 0)        div.classList.add('edge-left');
      if (c === SIZE - 1) div.classList.add('edge-right');

      if (starPoints.some(([sr, sc]) => sr === r && sc === c)) {
        const dot = document.createElement('div');
        dot.className = 'star-point';
        div.appendChild(dot);
      }

      const isWin = winCells.some(([wr, wc]) => wr === r && wc === c);

      if (board[r][c] !== 0) {
        const stone = document.createElement('div');
        stone.className = 'stone ' + (board[r][c] === 1 ? 'black' : 'white');
        if (isWin) stone.classList.add('winning');
        div.appendChild(stone);
      } else if (!gameOver && !aiThinking) {
        const preview = document.createElement('div');
        preview.className = 'hover-preview black';
        div.appendChild(preview);
        div.addEventListener('click', () => playerMove(r, c));
      }
      el.appendChild(div);
    }
  }
}

function playerMove(r, c) {
  if (gameOver || aiThinking || board[r][c] !== 0) {
    if (board[r][c] !== 0) playSound('invalid');
    return;
  }
  board[r][c] = 1;
  moveHistory.push([r, c, 1]);
  playSound('black');
  renderBoard();

  const w = checkWin(board, r, c, 1);
  if (w) {
    winCells = w; gameOver = true;
    renderBoard();
    setMsg('🎉 恭喜！您獲勝了！', true);
    playSound('win');
    return;
  }
  if (isBoardFull()) { setMsg('平局！棋盤已下滿'); gameOver = true; return; }

  setMsg('<span class="thinking-dots">AI 思考中<span>.</span><span>.</span><span>.</span></span>');
  setActive(false);
  aiThinking = true;
  renderBoard();
  setTimeout(aiMove, difficulty === 1 ? 300 : difficulty === 2 ? 500 : 800);
}

function aiMove() {
  const [r, c] = getBestMove();
  board[r][c] = 2;
  moveHistory.push([r, c, 2]);
  aiThinking = false;
  playSound('white');

  const w = checkWin(board, r, c, 2);
  if (w) {
    winCells = w; gameOver = true;
    renderBoard();
    setMsg('😔 AI 獲勝！再試一次？', true);
    playSound('lose');
    return;
  }
  if (isBoardFull()) { setMsg('平局！棋盤已下滿'); gameOver = true; renderBoard(); return; }
  setActive(true);
  setMsg('您的回合，請落子');
  renderBoard();
}

function isBoardFull() {
  return board.every(row => row.every(c => c !== 0));
}

function checkWin(b, r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const cells = [[r, c]];
    for (const d of [-1, 1]) {
      let nr = r + dr * d, nc = c + dc * d;
      while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && b[nr][nc] === player) {
        cells.push([nr, nc]);
        nr += dr * d; nc += dc * d;
      }
    }
    if (cells.length >= 5) return cells;
  }
  return null;
}

function evalPos(b, r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let total = 0;
  for (const [dr, dc] of dirs) {
    let count = 1, open = 0;
    for (const d of [-1, 1]) {
      let nr = r + dr * d, nc = c + dc * d, cnt = 0;
      while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && b[nr][nc] === player) {
        cnt++; nr += dr * d; nc += dc * d;
      }
      count += cnt;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && b[nr][nc] === 0) open++;
    }
    const scores = [0, 1, 10, 100, 1000, 100000];
    total += (scores[Math.min(count, 5)] || 0) * (open + 1);
  }
  return total;
}

function getBestMove() {
  const ai = 2, opp = 1;

  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] !== 0) continue;
    board[r][c] = ai;
    if (checkWin(board, r, c, ai)) { board[r][c] = 0; return [r, c]; }
    board[r][c] = 0;
  }
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] !== 0) continue;
    board[r][c] = opp;
    if (checkWin(board, r, c, opp)) { board[r][c] = 0; return [r, c]; }
    board[r][c] = 0;
  }

  if (difficulty === 1) return randomMove();

  const candidates = getCandidates();
  let best = -Infinity, bestPos = [7, 7];

  for (const [r, c] of candidates) {
    board[r][c] = ai;
    let s = evalPos(board, r, c, ai) * 2 + evalPos(board, r, c, opp) * 1.5;
    if (difficulty === 3) s += minimax(board, 1, -Infinity, Infinity, false, r, c);
    board[r][c] = 0;
    if (s > best) { best = s; bestPos = [r, c]; }
  }
  return bestPos;
}

function minimax(b, depth, alpha, beta, isMax, lr, lc) {
  if (depth === 0) return evalPos(b, lr, lc, 2) - evalPos(b, lr, lc, 1);
  const cands = getCandidates().slice(0, 8);
  if (!cands.length) return 0;
  if (isMax) {
    let best = -Infinity;
    for (const [r, c] of cands) {
      b[r][c] = 2;
      best = Math.max(best, minimax(b, depth - 1, alpha, beta, false, r, c));
      b[r][c] = 0;
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const [r, c] of cands) {
      b[r][c] = 1;
      best = Math.min(best, minimax(b, depth - 1, alpha, beta, true, r, c));
      b[r][c] = 0;
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function getCandidates() {
  const visited = new Set(), result = [], range = 2;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] === 0) continue;
    for (let dr = -range; dr <= range; dr++) for (let dc = -range; dc <= range; dc++) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || board[nr][nc] !== 0) continue;
      const key = nr * SIZE + nc;
      if (!visited.has(key)) { visited.add(key); result.push([nr, nc]); }
    }
  }
  if (!result.length) return [[7, 7]];
  return result.sort((a, b) =>
    evalPos(board, b[0], b[1], 2) + evalPos(board, b[0], b[1], 1) -
    evalPos(board, a[0], a[1], 2) - evalPos(board, a[0], a[1], 1)
  );
}

function randomMove() {
  const empty = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] === 0) empty.push([r, c]);
  return empty[Math.floor(Math.random() * empty.length)];
}

function undoMove() {
  if (gameOver) { resetGame(); return; }
  if (moveHistory.length < 2) { playSound('invalid'); return; }
  moveHistory.pop(); moveHistory.pop();
  initBoard();
  for (const [r, c, p] of moveHistory) board[r][c] = p;
  gameOver = false; aiThinking = false; winCells = [];
  setActive(true);
  setMsg('已悔棋，請繼續落子');
  renderBoard();
}

function resetGame() {
  initBoard();
  setActive(true);
  setMsg('您先下，請點擊棋盤落子');
  renderBoard();
}

function setMsg(html, isWin = false) {
  const el = document.getElementById('msg');
  el.innerHTML = html;
  el.className = 'message-box' + (isWin ? ' win' : '');
}

function setActive(playerTurn) {
  document.getElementById('p1').classList.toggle('active', playerTurn);
  document.getElementById('p2').classList.toggle('active', !playerTurn);
}

window.addEventListener('resize', () => renderBoard());
initBoard();
renderBoard();
</script>
