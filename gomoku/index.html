<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gomoku | 五子棋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-shell">
    <main class="app-shell">
      <section class="info-panel">
        <div class="title-block">
          <p class="badge">Classic</p>
          <h1>五子棋 / Gomoku</h1>
          <p class="subtitle">Sharpen your focus, place five in a row.</p>
        </div>
        <div class="gomoku-top-tags">
          <a class="tag" href="/">Home</a>
        </div>
        <div class="status-grid">
          <div class="status-card">
            <span class="label">Current Player</span>
            <div class="value current-player-value" id="current-player">
              <span class="player-badge black"></span>
              <span class="player-text">Black</span>
            </div>
          </div>
          <div class="status-card">
            <span class="label">Move Count</span>
            <div class="value" id="move-counter">0</div>
          </div>
          <div class="status-card">
            <span class="label">Game Status</span>
            <div class="value" id="game-status">Game in progress</div>
          </div>
          <div class="status-card">
            <span class="label">Sound</span>
            <div class="value" id="sound-indicator">On</div>
          </div>
          <div class="status-card">
            <span class="label">Opponent</span>
            <div class="value" id="ai-indicator">AI opponent</div>
          </div>
          <div class="status-card">
            <span class="label">AI Level</span>
            <div class="value" id="ai-level-status">Level 3 · Balanced</div>
          </div>
        </div>
        <div class="controls">
          <button id="undo-button" class="control-btn">Undo</button>
          <button id="restart-button" class="control-btn primary">Restart</button>
          <button id="sound-toggle" class="control-btn toggle">Sound: On</button>
          <button id="ai-toggle" class="control-btn toggle">AI: On</button>
        </div>
        <div class="device-switch">
          <span class="device-label">View Mode</span>
          <button type="button" data-device-mode="pc" class="device-btn active">PC</button>
          <button type="button" data-device-mode="mobile" class="device-btn">Mobile</button>
        </div>
        <div class="ai-level-control">
          <label for="ai-level-slider">
            AI Level
            <span id="ai-level-display">Level 3 · Balanced</span>
          </label>
          <input id="ai-level-slider" type="range" min="0" max="5" step="1" value="3">
        </div>
      </section>
      <section class="board-area">
        <div class="board-frame">
          <div id="board" class="board" aria-label="Gomoku board"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
