<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>五子棋 AI 對戰 — openai-tw.com</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');

    :root {
      --bg: #0b0e14;
      --bg2: #0f1420;
      --board: #1a1208;
      --board-line: #3d2e1a;
      --board-line-bright: #5a4425;
      --panel: #111827;
      --line: #1f2d40;
      --text: #e8dcc8;
      --muted: #7a6a55;
      --accent: #c8a96e;
      --accent2: #e8c87a;
      --black-stone: #1a1a1a;
      --white-stone: #f0ece0;
      --red: #c0392b;
      --green: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(100,60,20,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid #253040;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .logo-link:hover { color: var(--accent); border-color: var(--accent); }
    .title-wrap { text-align: center; flex: 1; }
    .game-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .15em;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 60%, #a07840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }
    .game-sub { font-size: 12px; color: var(--muted); letter-spacing: .1em; margin-top: 2px; }

    /* ── Status bar ── */
    .status-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .player-card {
      flex: 1;
      min-width: 120px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .player-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 16px rgba(200,169,110,0.15);
    }
    .stone-icon {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5), inset 1px 1px 3px rgba(255,255,255,0.15);
    }
    .stone-icon.black { background: radial-gradient(circle at 35% 35%, #555, #111); }
    .stone-icon.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); }
    .player-info { flex: 1; }
    .player-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .player-label { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .player-score { font-size: 20px; font-weight: 900; color: var(--accent); }

    .status-center {
      text-align: center;
      min-width: 120px;
    }
    .status-msg {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: .05em;
      min-height: 20px;
    }
    .thinking-dots { display: inline-block; }
    .thinking-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '．'; }
      50%  { content: '．．'; }
      75%  { content: '．．．'; }
      100% { content: ''; }
    }

    /* ── Board ── */
    .board-wrap {
      position: relative;
      background: var(--board);
      border: 2px solid var(--board-line-bright);
      border-radius: 4px;
      box-shadow:
        0 0 0 6px #0f0a04,
        0 0 0 7px #3d2e1a,
        0 8px 40px rgba(0,0,0,0.8),
        inset 0 0 30px rgba(0,0,0,0.4);
      padding: 24px;
    }
    canvas#board {
      display: block;
      cursor: pointer;
    }
    canvas#board.no-click { cursor: not-allowed; }

    /* ── Win overlay ── */
    .win-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }
    .win-overlay.show { display: flex; }
    .win-msg {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: .2em;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      animation: winPop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes winPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 9px 22px;
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .05em;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      border-color: var(--accent);
      background: linear-gradient(135deg, #2a1e08, #1a1208);
      color: var(--accent2);
    }
    .btn.primary:hover { box-shadow: 0 0 12px rgba(200,169,110,0.3); }

    /* ── Difficulty & Side selector ── */
    .selectors {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .sel-group { display: flex; align-items: center; gap: 8px; }
    .sel-label { font-size: 12px; color: var(--muted); letter-spacing: .05em; }
    .seg {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .seg button {
      padding: 5px 12px;
      font-size: 12px;
      font-family: 'Noto Serif TC', serif;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
      border-right: 1px solid var(--line);
    }
    .seg button:last-child { border-right: none; }
    .seg button.on { background: #1e2a10; color: var(--accent2); font-weight: 700; }
    .seg button:hover:not(.on) { color: var(--text); background: #1a1f2a; }

    /* ── Move history ── */
    .history-wrap {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .history-label { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 60px;
      overflow-y: auto;
    }
    .history-item {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 3px;
      background: #1a1f2a;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .history-item.black { color: #aaa; }
    .history-item.white { color: var(--accent); }

    /* ── Footer ── */
    .foot { font-size: 12px; color: var(--muted); }
    .foot a { color: var(--accent); text-decoration: none; }

    @media (max-width: 560px) {
      .board-wrap { padding: 12px; }
      .game-title { font-size: 22px; }
      .win-msg { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <a class="logo-link" href="/">← 首頁</a>
    <div class="title-wrap">
      <div class="game-title">五子棋</div>
      <div class="game-sub">AI 對戰 · GOMOKU</div>
    </div>
    <a class="logo-link" href="/stock-search/">股市</a>
  </div>

  <!-- Selectors -->
  <div class="selectors">
    <div class="sel-group">
      <span class="sel-label">難度</span>
      <div class="seg" id="diff-seg">
        <button onclick="setDiff(1,this)">入門</button>
        <button onclick="setDiff(2,this)" class="on">普通</button>
        <button onclick="setDiff(3,this)">困難</button>
        <button onclick="setDiff(4,this)">專家</button>
      </div>
    </div>
    <div class="sel-group">
      <span class="sel-label">執子</span>
      <div class="seg" id="side-seg">
        <button onclick="setSide('black',this)" class="on">黑先</button>
        <button onclick="setSide('white',this)">白先</button>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="player-card" id="card-black">
      <div class="stone-icon black"></div>
      <div class="player-info">
        <div class="player-name" id="name-black">玩家</div>
        <div class="player-label">黑棋</div>
      </div>
      <div class="player-score" id="score-black">0</div>
    </div>
    <div class="status-center">
      <div class="status-msg" id="status-msg">黑棋先行</div>
    </div>
    <div class="player-card" id="card-white">
      <div class="stone-icon white"></div>
      <div class="player-info">
        <div class="player-name" id="name-white">AI</div>
        <div class="player-label">白棋</div>
      </div>
      <div class="player-score" id="score-white">0</div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <canvas id="board" width="450" height="450"></canvas>
    <div class="win-overlay" id="win-overlay">
      <div class="win-msg" id="win-msg">黑棋勝利！</div>
      <button class="btn primary" onclick="newGame()">再來一局</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn primary" onclick="newGame()">新局開始</button>
    <button class="btn" onclick="undoMove()">悔棋</button>
    <button class="btn" id="sound-btn" onclick="toggleSound()">🔊 音效開</button>
  </div>

  <!-- Move history -->
  <div class="history-wrap">
    <div class="history-label">落子記錄</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="foot"><a href="/">openai-tw.com</a> · 五子棋 AI 對戰</div>
</div>

<script>
/* ══════════════════════════════════════
   CONSTANTS & STATE
══════════════════════════════════════ */
const SIZE = 15;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 80, 480);
  const sz = Math.floor(maxW / SIZE) * SIZE;
  canvas.width = sz;
  canvas.height = sz;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawBoard(); });

let board = [];
let currentPlayer = 1; // 1=black, 2=white
let gameOver = false;
let aiColor = 2;       // AI plays white by default
let humanColor = 1;
let difficulty = 2;
let scores = { 1: 0, 2: 0 };
let moveHistory = [];
let boardHistory = [];
let soundOn = true;
let aiThinking = false;

const COLS = 'ABCDEFGHJKLMNOP';

/* ══════════════════════════════════════
   AUDIO (Web Audio API — no files needed)
══════════════════════════════════════ */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playStone(isBlack) {
  if (!soundOn) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    const osc2 = ac.createOscillator();
    const gain2 = ac.createGain();

    osc.connect(gain); gain.connect(ac.destination);
    osc2.connect(gain2); gain2.connect(ac.destination);

    const freq = isBlack ? 800 : 1100;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ac.currentTime + 0.08);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.12);

    // Click transient
    osc2.frequency.setValueAtTime(2000, ac.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.03);
    osc2.type = 'square';
    gain2.gain.setValueAtTime(0.06, ac.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
    osc2.start(ac.currentTime);
    osc2.stop(ac.currentTime + 0.04);
  } catch(e) {}
}

function playWin() {
  if (!soundOn) return;
  try {
    const ac = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ac.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

function playLose() {
  if (!soundOn) return;
  try {
    const ac = getAudioCtx();
    const notes = [400, 330, 280];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ac.currentTime + i * 0.2;
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e) {}
}

function playUndo() {
  if (!soundOn) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.setValueAtTime(600, ac.currentTime);
    osc.frequency.linearRampToValueAtTime(400, ac.currentTime + 0.1);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.15);
  } catch(e) {}
}

/* ══════════════════════════════════════
   DRAWING
══════════════════════════════════════ */
function cellSize() { return canvas.width / SIZE; }

function drawBoard() {
  const cs = cellSize();
  const W = canvas.width;
  ctx.clearRect(0, 0, W, W);

  // Board background
  ctx.fillStyle = '#1a1208';
  ctx.fillRect(0, 0, W, W);

  // Wood grain lines (subtle)
  ctx.strokeStyle = 'rgba(80,50,20,0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 8) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, W); ctx.stroke();
  }

  // Grid lines
  ctx.strokeStyle = '#3d2e1a';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < SIZE; i++) {
    const x = cs * i + cs / 2;
    ctx.beginPath(); ctx.moveTo(x, cs/2); ctx.lineTo(x, W - cs/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cs/2, x); ctx.lineTo(W - cs/2, x); ctx.stroke();
  }

  // Star points
  const stars = [[3,3],[3,11],[11,3],[11,11],[7,7],[3,7],[7,3],[11,7],[7,11]];
  ctx.fillStyle = '#5a4425';
  stars.forEach(([r,c]) => {
    ctx.beginPath();
    ctx.arc(c * cs + cs/2, r * cs + cs/2, cs * 0.08, 0, Math.PI*2);
    ctx.fill();
  });

  // Stones
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c]) drawStone(r, c, board[r][c]);
    }
  }

  // Last move marker
  if (moveHistory.length > 0) {
    const last = moveHistory[moveHistory.length - 1];
    const x = last.c * cs + cs/2;
    const y = last.r * cs + cs/2;
    ctx.strokeStyle = last.player === 1 ? 'rgba(255,200,100,0.9)' : 'rgba(50,50,50,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, cs * 0.15, 0, Math.PI*2); ctx.stroke();
  }
}

function drawStone(r, c, player) {
  const cs = cellSize();
  const x = c * cs + cs/2;
  const y = r * cs + cs/2;
  const radius = cs * 0.42;

  ctx.save();
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = cs * 0.3;
  ctx.shadowOffsetX = cs * 0.06;
  ctx.shadowOffsetY = cs * 0.08;

  // Stone gradient
  const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.05, x, y, radius);
  if (player === 1) {
    grad.addColorStop(0, '#666');
    grad.addColorStop(0.4, '#222');
    grad.addColorStop(1, '#050505');
  } else {
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, '#e8e4d8');
    grad.addColorStop(1, '#b8b4a8');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fill();

  // Highlight
  ctx.shadowColor = 'transparent';
  const hl = ctx.createRadialGradient(x - radius*0.3, y - radius*0.35, 0, x - radius*0.1, y - radius*0.2, radius*0.6);
  hl.addColorStop(0, player===1 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.7)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function animateStone(r, c, player) {
  const cs = cellSize();
  const x = c * cs + cs/2;
  const y = r * cs + cs/2;
  const maxR = cs * 0.42;
  let progress = 0;
  const duration = 8;

  function step() {
    progress++;
    const radius = maxR * (progress / duration);
    // Redraw only the stone area (cheap)
    ctx.clearRect(x - maxR - 4, y - maxR - 4, maxR*2+8, maxR*2+8);

    // Redraw grid under stone
    ctx.strokeStyle = '#3d2e1a';
    ctx.lineWidth = 0.8;
    const col = c, row = r;
    const gx = col * cs + cs/2, gy = row * cs + cs/2;
    ctx.beginPath(); ctx.moveTo(gx, cs/2); ctx.lineTo(gx, canvas.width - cs/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cs/2, gy); ctx.lineTo(canvas.width - cs/2, gy); ctx.stroke();

    // Draw growing stone
    const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.05, x, y, radius);
    if (player === 1) {
      grad.addColorStop(0, '#666'); grad.addColorStop(0.4, '#222'); grad.addColorStop(1, '#050505');
    } else {
      grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.4, '#e8e4d8'); grad.addColorStop(1, '#b8b4a8');
    }
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = cs*0.3;
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    if (progress < duration) requestAnimationFrame(step);
    else drawBoard();
  }
  requestAnimationFrame(step);
}

/* ══════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════ */
function initBoard() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
}

function newGame() {
  initBoard();
  gameOver = false;
  aiThinking = false;
  moveHistory = [];
  boardHistory = [];
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('history-list').innerHTML = '';
  canvas.classList.remove('no-click');

  currentPlayer = 1; // black always starts
  updateStatus();
  drawBoard();

  // If AI is black, AI moves first
  if (humanColor === 2) {
    setTimeout(aiMove, 300);
  }
}

function updateStatus() {
  const blackCard = document.getElementById('card-black');
  const whiteCard = document.getElementById('card-white');
  blackCard.classList.toggle('active', currentPlayer === 1 && !gameOver);
  whiteCard.classList.toggle('active', currentPlayer === 2 && !gameOver);

  const nameB = humanColor === 1 ? '玩家' : 'AI';
  const nameW = humanColor === 2 ? '玩家' : 'AI';
  document.getElementById('name-black').textContent = nameB;
  document.getElementById('name-white').textContent = nameW;

  if (!gameOver) {
    const whose = currentPlayer === humanColor ? '您的回合' : 'AI 思考中';
    document.getElementById('status-msg').innerHTML =
      currentPlayer === humanColor
        ? (currentPlayer===1 ? '黑棋 · 您的回合' : '白棋 · 您的回合')
        : `${currentPlayer===1?'黑棋':'白棋'} · <span class="thinking-dots">AI 思考中</span>`;
  }
}

function placeStone(r, c, player) {
  boardHistory.push(board.map(row => [...row]));
  board[r][c] = player;
  moveHistory.push({ r, c, player });
  addHistory(r, c, player);
  animateStone(r, c, player);
  playStone(player === 1);
}

function addHistory(r, c, player) {
  const el = document.createElement('div');
  el.className = 'history-item ' + (player===1 ? 'black' : 'white');
  const move = moveHistory.length;
  el.textContent = `${move}. ${COLS[c]}${r+1}`;
  const list = document.getElementById('history-list');
  list.appendChild(el);
  list.scrollLeft = list.scrollWidth;
}

function checkWin(b, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (b[r][c] !== player) continue;
      for (const [dr,dc] of dirs) {
        let count = 1;
        for (let i = 1; i < 5; i++) {
          const nr = r+dr*i, nc = c+dc*i;
          if (nr<0||nr>=SIZE||nc<0||nc>=SIZE||b[nr][nc]!==player) break;
          count++;
        }
        if (count >= 5) return true;
      }
    }
  }
  return false;
}

function highlightWin(player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== player) continue;
      for (const [dr,dc] of dirs) {
        let cells = [[r,c]];
        for (let i = 1; i < 5; i++) {
          const nr = r+dr*i, nc = c+dc*i;
          if (nr<0||nr>=SIZE||nc<0||nc>=SIZE||board[nr][nc]!==player) break;
          cells.push([nr,nc]);
        }
        if (cells.length >= 5) {
          const cs = cellSize();
          cells.forEach(([wr,wc]) => {
            const x = wc*cs+cs/2, y = wr*cs+cs/2;
            ctx.strokeStyle = 'rgba(255,60,60,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(x, y, cs*0.42, 0, Math.PI*2); ctx.stroke();
          });
          return;
        }
      }
    }
  }
}

/* ══════════════════════════════════════
   HUMAN CLICK
══════════════════════════════════════ */
canvas.addEventListener('click', (e) => {
  if (gameOver || aiThinking || currentPlayer !== humanColor) return;
  const rect = canvas.getBoundingClientRect();
  const cs = cellSize();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const c = Math.floor(mx / cs);
  const r = Math.floor(my / cs);
  if (r<0||r>=SIZE||c<0||c>=SIZE||board[r][c]!==0) return;

  placeStone(r, c, humanColor);

  if (checkWin(board, humanColor)) {
    endGame(humanColor); return;
  }
  if (moveHistory.length === SIZE*SIZE) { endGame(0); return; }

  currentPlayer = aiColor;
  updateStatus();
  canvas.classList.add('no-click');
  setTimeout(aiMove, difficulty > 2 ? 400 : 200);
});

/* ══════════════════════════════════════
   AI ENGINE (Minimax + Alpha-Beta)
══════════════════════════════════════ */
const SCORE = {
  FIVE: 100000000,
  OPEN4: 10000000,
  BLOCK4: 1000000,
  OPEN3: 100000,
  BLOCK3: 10000,
  OPEN2: 1000,
  BLOCK2: 100,
  OPEN1: 10,
};

function evaluate(b, player) {
  const opp = player===1?2:1;
  let score = 0;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r=0;r<SIZE;r++) {
    for (let c=0;c<SIZE;c++) {
      if (b[r][c]===0) continue;
      const p = b[r][c];
      const mul = p===player ? 1 : -1;
      for (const [dr,dc] of dirs) {
        let cnt=1, open1=0, open2=0;
        // forward
        for (let i=1;i<5;i++) {
          const nr=r+dr*i,nc=c+dc*i;
          if (nr<0||nr>=SIZE||nc<0||nc>=SIZE) break;
          if (b[nr][nc]===p) cnt++;
          else { if (b[nr][nc]===0) open1=1; break; }
        }
        // backward
        const br2=r-dr,bc2=c-dc;
        if (br2>=0&&br2<SIZE&&bc2>=0&&bc2<SIZE&&b[br2][bc2]===0) open2=1;

        let s=0;
        if (cnt>=5) s=SCORE.FIVE;
        else if (cnt===4) s=open1&&open2?SCORE.OPEN4:SCORE.BLOCK4;
        else if (cnt===3) s=open1&&open2?SCORE.OPEN3:SCORE.BLOCK3;
        else if (cnt===2) s=open1&&open2?SCORE.OPEN2:SCORE.BLOCK2;
        else s=SCORE.OPEN1;
        score += mul * s;
      }
    }
  }
  return score;
}

function getCandidates(b) {
  const cands = new Set();
  for (let r=0;r<SIZE;r++) {
    for (let c=0;c<SIZE;c++) {
      if (b[r][c]===0) continue;
      for (let dr=-2;dr<=2;dr++) {
        for (let dc=-2;dc<=2;dc++) {
          const nr=r+dr,nc=c+dc;
          if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&b[nr][nc]===0)
            cands.add(nr*SIZE+nc);
        }
      }
    }
  }
  if (cands.size===0) cands.add(7*SIZE+7); // first move center
  return [...cands].map(k=>[Math.floor(k/SIZE),k%SIZE]);
}

function minimax(b, depth, alpha, beta, isMax, aiP, humanP) {
  if (checkWin(b, aiP))    return SCORE.FIVE * 10;
  if (checkWin(b, humanP)) return -SCORE.FIVE * 10;
  if (depth === 0)          return evaluate(b, aiP);

  const cands = getCandidates(b);
  if (isMax) {
    let best = -Infinity;
    for (const [r,c] of cands) {
      b[r][c] = aiP;
      const val = minimax(b, depth-1, alpha, beta, false, aiP, humanP);
      b[r][c] = 0;
      if (val > best) best = val;
      if (best > alpha) alpha = best;
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const [r,c] of cands) {
      b[r][c] = humanP;
      const val = minimax(b, depth-1, alpha, beta, true, aiP, humanP);
      b[r][c] = 0;
      if (val < best) best = val;
      if (best < beta) beta = best;
      if (beta <= alpha) break;
    }
    return best;
  }
}

function aiMove() {
  if (gameOver) return;
  aiThinking = true;

  // Use setTimeout to not block UI
  setTimeout(() => {
    const depth = [0,1,2,3,4][difficulty]; // depth by difficulty
    const b = board.map(row=>[...row]);
    const cands = getCandidates(b);
    let bestVal = -Infinity, bestR = -1, bestC = -1;

    // Quick win check first
    for (const [r,c] of cands) {
      b[r][c] = aiColor;
      if (checkWin(b, aiColor)) { bestR=r; bestC=c; b[r][c]=0; break; }
      b[r][c] = 0;
    }
    // Block human win
    if (bestR === -1) {
      for (const [r,c] of cands) {
        b[r][c] = humanColor;
        if (checkWin(b, humanColor)) { bestR=r; bestC=c; b[r][c]=0; break; }
        b[r][c] = 0;
      }
    }
    // Minimax search
    if (bestR === -1) {
      for (const [r,c] of cands) {
        b[r][c] = aiColor;
        const val = minimax(b, depth-1, -Infinity, Infinity, false, aiColor, humanColor);
        b[r][c] = 0;
        if (val > bestVal) { bestVal=val; bestR=r; bestC=c; }
      }
    }

    if (bestR !== -1) {
      placeStone(bestR, bestC, aiColor);
      if (checkWin(board, aiColor)) { endGame(aiColor); return; }
      if (moveHistory.length === SIZE*SIZE) { endGame(0); return; }
    }

    aiThinking = false;
    currentPlayer = humanColor;
    canvas.classList.remove('no-click');
    updateStatus();
  }, 10);
}

function endGame(winner) {
  gameOver = true;
  aiThinking = false;
  canvas.classList.add('no-click');

  setTimeout(() => {
    if (winner !== 0) highlightWin(winner);
    const overlay = document.getElementById('win-overlay');
    const msg = document.getElementById('win-msg');
    if (winner === 0) {
      msg.textContent = '平局！';
    } else if (winner === humanColor) {
      msg.textContent = winner===1 ? '🏆 黑棋勝利！' : '🏆 白棋勝利！';
      scores[humanColor]++;
      playWin();
    } else {
      msg.textContent = winner===1 ? 'AI 黑棋勝！' : 'AI 白棋勝！';
      scores[aiColor]++;
      playLose();
    }
    document.getElementById('score-black').textContent = scores[1];
    document.getElementById('score-white').textContent = scores[2];
    document.getElementById('status-msg').textContent = winner===0?'平局':winner===humanColor?'您贏了！':'AI 獲勝';
    overlay.classList.add('show');
  }, 300);
}

/* ══════════════════════════════════════
   CONTROLS
══════════════════════════════════════ */
function undoMove() {
  if (aiThinking || moveHistory.length < 2) return;
  // Undo 2 moves (human + AI)
  const times = moveHistory[moveHistory.length-1].player === humanColor ? 1 : 2;
  for (let i=0;i<times&&boardHistory.length>0;i++) {
    board = boardHistory.pop();
    moveHistory.pop();
    const list = document.getElementById('history-list');
    if (list.lastChild) list.removeChild(list.lastChild);
  }
  gameOver = false;
  currentPlayer = humanColor;
  canvas.classList.remove('no-click');
  document.getElementById('win-overlay').classList.remove('show');
  updateStatus();
  drawBoard();
  playUndo();
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊 音效開' : '🔇 音效關';
}

function setDiff(d, el) {
  difficulty = d;
  document.querySelectorAll('#diff-seg button').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function setSide(side, el) {
  document.querySelectorAll('#side-seg button').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  if (side === 'black') { humanColor=1; aiColor=2; }
  else                  { humanColor=2; aiColor=1; }
  newGame();
}

/* ══════════════════════════════════════
   INIT

newGame();
