<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Star War</title>
 <style>
 * { box-sizing: border-box; }
 body {
 margin: 0;
 background: radial-gradient(circle at top, #0b1026 0%, #03050d 55%, #000 100%);
 color: #e8f1ff;
 font-family: Arial, Helvetica, sans-serif;
 display: flex;
 align-items: center;
 justify-content: center;
 min-height: 100vh;
 overflow: hidden;
 }
 .wrap {
 width: min(95vw, 920px);
 text-align: center;
 }
 h1 {
 margin: 0 0 10px;
 letter-spacing: 3px;
 font-size: clamp(28px, 4vw, 44px);
 color: #8fd3ff;
 text-shadow: 0 0 14px rgba(143, 211, 255, 0.45);
 }
 p {
 margin: 8px 0 16px;
 color: #b5c8e8;
 }
 canvas {
 width: 100%;
 max-width: 920px;
 height: auto;
 aspect-ratio: 920 / 560;
 border: 2px solid rgba(143, 211, 255, 0.25);
 border-radius: 16px;
 background: linear-gradient(180deg, rgba(7,12,31,.95), rgba(0,0,0,1));
 box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55), 0 0 30px rgba(88, 154, 255, 0.12);
 }
 .fullscreen-btn {
 font-size: 24px;
 background: rgba(255,255,255,0.1);
 border: 2px solid rgba(143, 211, 255, 0.4);
 border-radius: 8px;
 padding: 8px 12px;
 cursor: pointer;
 }
 .hud {
 display: flex;
 justify-content: space-between;
 gap: 12px;
 margin: 12px 0;
 flex-wrap: wrap;
 font-weight: bold;
 }
 .tag {
 background: rgba(255,255,255,0.06);
 border: 1px solid rgba(255,255,255,0.08);
 border-radius: 999px;
 padding: 8px 14px;
 min-width: 140px;
 }
 .accent { color: #7ef9a9; }
 .danger { color: #ff7f98; }
 .hint { font-size: 14px; opacity: .9; }
 .mobile-controls {
 display: none;
 margin-top: 16px;
 gap: 20px;
 }
 .bottom-controls {
 display: flex;
 justify-content: center;
 gap: 20px;
 margin-top: 16px;
 }
 .ctrl-btn {
 width: 80px;
 height: 60px;
 font-size: 28px;
 background: rgba(255,255,255,0.1);
 border: 2px solid rgba(143, 211, 255, 0.4);
 border-radius: 12px;
 color: #8fd3ff;
 cursor: pointer;
 user-select: none;
 -webkit-user-select: none;
 touch-action: manipulation;
 }
 .ctrl-btn:active {
 background: rgba(143, 211, 255, 0.3);
 }
 @media (max-width: 600px) {
 .mobile-controls {
 display: flex;
 justify-content: center;
 }
 .mobile-hint {
 display: block;
 }
 .hint:not(.mobile-hint) {
 display: none;
 }
 canvas {
 width: 100vw;
 height: calc(100vw * 6 / 3);
 max-width: 100vw;
 border-radius: 0;
 border-left: none;
 border-right: none;
 }
 }
 .home-link {
 position: fixed;
 top: 20px;
 left: 20px;
 color: #4ecdc4;
 text-decoration: none;
 font-size: 1.2rem;
 padding: 8px 16px;
 background: rgba(255,255,255,0.1);
 border-radius: 8px;
 transition: all 0.2s;
 }
 .home-link:hover {
 background: rgba(255,255,255,0.2);
 transform: scale(1.05);
 }
 </style>
</head>
<body>
 <div class="wrap">
 <h1>STAR WAR</h1>
 <canvas id="game" width="1440" height="720"></canvas>
 <div class="mobile-controls">
 <button class="ctrl-btn" id="btnLeft">⬅️</button>
 <button class="ctrl-btn" id="btnShoot">🔫</button>
 <button class="ctrl-btn" id="btnRight">➡️</button>
 </div>
 <div class="hud">
 <div class="tag">Score: <span id="score" class="accent">0</span></div>
 <div class="tag">Lives: <span id="lives" class="danger">3</span></div>
 <div class="tag">Level: <span id="level">1</span></div>
 </div>
 <div class="bottom-controls">
 <a href="/" class="home-link">🏠 Home</a>
 <button class="ctrl-btn" id="btnRestart" style="min-width:auto;padding:8px 16px;font-size:18px;">🔄</button>
 <button class="fullscreen-btn" id="fullscreenBtn" style="position:static;">⛶</button>
 </div>

 <p class="hint">Tiny arcade chaos, maximum laser drama.</p>
 </div>
 </div>

 <script>
 let audioCtx = null;

 function getAudioContext() {
 if (!audioCtx) {
 audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 return audioCtx;
 }

 function playShootSound() {
 const ctx = getAudioContext();
 const now = ctx.currentTime;
 
 // 咻 sound - quick high pitch sweep
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.setValueAtTime(880, now);
 osc.frequency.exponentialRampToValueAtTime(220, now + 0.1);
 osc.type = 'sine';
 gain.gain.setValueAtTime(0.15, now);
 gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
 osc.start(now);
 osc.stop(now + 0.1);
 }

 function playExplodeSound() {
 const ctx = getAudioContext();
 const now = ctx.currentTime;
 
 // 爆炸 sound - noise-like
 for (let i = 0; i < 8; i++) {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value = 100 + Math.random() * 200;
 osc.type = 'sawtooth';
 gain.gain.setValueAtTime(0.2, now + i * 0.03);
 gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.03 + 0.08);
 osc.start(now + i * 0.03);
 osc.stop(now + i * 0.03 + 0.08);
 }
 }

 function playWinSound() {
 const ctx = getAudioContext();
 const now = ctx.currentTime;
 
 // 拍拍手 clapping sound
 for (let i = 0; i < 6; i++) {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value = 200 + Math.random() * 100;
 osc.type = 'square';
 gain.gain.setValueAtTime(0.15, now + i * 0.15);
 gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.1);
 osc.start(now + i * 0.15);
 osc.stop(now + i * 0.15 + 0.1);
 }
 }

 function playCrazySound() {
 const ctx = getAudioContext();
 const now = ctx.currentTime;
 
 // Crazy game over sound
 for (let i = 0; i < 12; i++) {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value = 150 + Math.random() * 400;
 osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
 gain.gain.setValueAtTime(0.15, now + i * 0.1);
 gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.15);
 osc.start(now + i * 0.1);
 osc.stop(now + i * 0.1 + 0.15);
 }
 }

 const canvas = document.getElementById('game');
 const ctx = canvas.getContext('2d');
 const scoreEl = document.getElementById('score');
 const livesEl = document.getElementById('lives');
 const levelEl = document.getElementById('level');

 const keys = {};
 let score = 0;
 let lives = 3;
 let level = 1;
 let gameOver = false;
 let frame = 0;

 const stars = Array.from({ length: 140 }, () => ({
 x: Math.random() * canvas.width,
 y: Math.random() * canvas.height,
 size: Math.random() * 2 + 0.4,
 speed: Math.random() * 1.8 + 0.2
 }));

 const player = {
 x: canvas.width / 2 - 22,
 y: canvas.height - 70,
 w: 44,
 h: 44,
 speed: 6,
 cooldown: 0
 };

 let bullets = [];
 let enemies = [];
 let enemyBullets = [];
 let particles = [];
 let enemyDirection = 1;

 function spawnWave() {
 enemies = [];
 const rows = Math.min(3 + level, 6);
 const cols = Math.min(7 + level, 12);
 const startX = 110;
 const startY = 70;
 const gapX = 58;
 const gapY = 48;

 for (let r = 0; r < rows; r++) {
 for (let c = 0; c < cols; c++) {
 enemies.push({
 x: startX + c * gapX,
 y: startY + r * gapY,
 w: 30,
 h: 24,
 alive: true,
 type: (r + c) % 2
 });
 }
 }
 }

 function resetGame() {
 score = 0;
 lives = 3;
 level = 1;
 gameOver = false;
 frame = 0;
 bullets = [];
 enemyBullets = [];
 particles = [];
 player.x = canvas.width / 2 - player.w / 2;
 player.cooldown = 0;
 enemyDirection = 1;
 spawnWave();
 updateHUD();
 }

 function updateHUD() {
 scoreEl.textContent = score;
 livesEl.textContent = lives;
 levelEl.textContent = level;
 }

 function shoot() {
 if (player.cooldown <= 0 && !gameOver) {
 bullets.push({
 x: player.x + player.w / 2 - 2,
 y: player.y - 10,
 w: 4,
 h: 12,
 speed: 9
 });
 player.cooldown = 14;
 playShootSound();
 }
 }

 function explode(x, y, color = '#8fd3ff', count = 14) {
 for (let i = 0; i < count; i++) {
 particles.push({
 x,
 y,
 vx: (Math.random() - 0.5) * 4,
 vy: (Math.random() - 0.5) * 4,
 life: 28 + Math.random() * 18,
 color
 });
 }
 }

 function rectsCollide(a, b) {
 return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
 }

 function update() {
 frame++;

 if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
 if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
 player.x = Math.max(12, Math.min(canvas.width - player.w - 12, player.x));

 if (player.cooldown > 0) player.cooldown--;

 bullets.forEach(b => b.y -= b.speed);
 bullets = bullets.filter(b => b.y + b.h > 0);

 const aliveEnemies = enemies.filter(e => e.alive);
 let moveDown = false;
 const enemySpeed = 0.4 + level * 0.12;

 for (const enemy of aliveEnemies) {
 enemy.x += enemyDirection * enemySpeed;
 if (enemy.x <= 18 || enemy.x + enemy.w >= canvas.width - 18) moveDown = true;
 }

 if (moveDown) {
 enemyDirection *= -1;
 for (const enemy of aliveEnemies) enemy.y += 18;
 }

 if (!gameOver && aliveEnemies.length && frame % Math.max(28, 85 - level * 6) === 0) {
 const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
 enemyBullets.push({ x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h, w: 4, h: 12, speed: 4 + level * 0.35 });
 }

 enemyBullets.forEach(b => b.y += b.speed);
 enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);

 for (const bullet of bullets) {
 for (const enemy of enemies) {
 if (enemy.alive && rectsCollide(bullet, enemy)) {
 enemy.alive = false;
 bullet.y = -999;
 score += 10;
 explode(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.type ? '#ff7f98' : '#ffe27a');
 playExplodeSound();
 updateHUD();
 break;
 }
 }
 }
 bullets = bullets.filter(b => b.y > -100);

 for (const bullet of enemyBullets) {
 if (rectsCollide(bullet, player)) {
 bullet.y = canvas.height + 999;
 lives--;
 explode(player.x + player.w / 2, player.y + player.h / 2, '#ff7f98', 22);
 playExplodeSound();
 updateHUD();
 if (lives <= 0) {
 gameOver = true;
 playCrazySound();
 }
 }
 }
 enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 50);

 for (const enemy of enemies) {
 if (enemy.alive && enemy.y + enemy.h >= player.y) {
 gameOver = true;
 playCrazySound();
 }
 }

 particles.forEach(p => {
 p.x += p.vx;
 p.y += p.vy;
 p.life -= 1;
 });
 particles = particles.filter(p => p.life > 0);

 if (enemies.every(e => !e.alive)) {
 level++;
 playWinSound();
 enemyDirection = 1;
 bullets = [];
 enemyBullets = [];
 spawnWave();
 updateHUD();
 }

 stars.forEach(s => {
 s.y += s.speed;
 if (s.y > canvas.height) {
 s.y = 0;
 s.x = Math.random() * canvas.width;
 }
 });
 }

 function drawShip(x, y, w, h) {
 ctx.save();
 ctx.translate(x, y);
 ctx.beginPath();
 ctx.moveTo(w / 2, 0);
 ctx.lineTo(w, h);
 ctx.lineTo(w / 2, h * 0.72);
 ctx.lineTo(0, h);
 ctx.closePath();
 ctx.fillStyle = '#8fd3ff';
 ctx.fill();

 ctx.beginPath();
 ctx.moveTo(w / 2, 10);
 ctx.lineTo(w * 0.68, h * 0.58);
 ctx.lineTo(w * 0.32, h * 0.58);
 ctx.closePath();
 ctx.fillStyle = '#ffffff';
 ctx.fill();

 ctx.fillStyle = '#7ef9a9';
 ctx.fillRect(w * 0.18, h - 6, 8, 10);
 ctx.fillRect(w * 0.82 - 8, h - 6, 8, 10);
 ctx.restore();
 }

 function drawEnemy(e) {
 ctx.save();
 ctx.translate(e.x, e.y);
 ctx.fillStyle = e.type ? '#ff7f98' : '#ffe27a';
 ctx.fillRect(4, 8, e.w - 8, e.h - 10);
 ctx.fillRect(0, 12, 6, 8);
 ctx.fillRect(e.w - 6, 12, 6, 8);
 ctx.fillRect(8, 0, e.w - 16, 8);
 ctx.fillStyle = '#1c1c1c';
 ctx.fillRect(8, 12, 4, 4);
 ctx.fillRect(e.w - 12, 12, 4, 4);
 ctx.restore();
 }

 function draw() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);

 for (const s of stars) {
 ctx.globalAlpha = 0.5 + Math.random() * 0.5;
 ctx.fillStyle = '#ffffff';
 ctx.fillRect(s.x, s.y, s.size, s.size);
 }
 ctx.globalAlpha = 1;

 ctx.fillStyle = 'rgba(80, 150, 255, 0.08)';
 for (let i = 0; i < 6; i++) {
 ctx.beginPath();
 ctx.arc(120 + i * 150, -40, 120, 0, Math.PI * 2);
 ctx.fill();
 }

 drawShip(player.x, player.y, player.w, player.h);

 bullets.forEach(b => {
 ctx.fillStyle = '#7ef9a9';
 ctx.fillRect(b.x, b.y, b.w, b.h);
 });

 enemyBullets.forEach(b => {
 ctx.fillStyle = '#ff7f98';
 ctx.fillRect(b.x, b.y, b.w, b.h);
 });

 enemies.forEach(e => e.alive && drawEnemy(e));

 particles.forEach(p => {
 ctx.globalAlpha = Math.max(0, p.life / 40);
 ctx.fillStyle = p.color;
 ctx.fillRect(p.x, p.y, 3, 3);
 });
 ctx.globalAlpha = 1;

 if (gameOver) {
 ctx.fillStyle = 'rgba(0,0,0,0.55)';
 ctx.fillRect(0, 0, canvas.width, canvas.height);
 ctx.textAlign = 'center';
 ctx.fillStyle = '#ffffff';
 ctx.font = 'bold 54px Arial';
 ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 18);
 ctx.font = '24px Arial';
 ctx.fillStyle = '#b5c8e8';
 ctx.fillText('Press R to fight again', canvas.width / 2, canvas.height / 2 + 28);
 }
 }

 function loop() {
 if (!gameOver) update();
 draw();
 requestAnimationFrame(loop);
 }

 window.addEventListener('keydown', e => {
 keys[e.key] = true;
 getAudioContext(); // Initialize audio on first interaction
 if (e.key === ' ' || e.code === 'Space') {
 e.preventDefault();
 shoot();
 }
 if ((e.key === 'r' || e.key === 'R') && gameOver) resetGame();
 });

 window.addEventListener('keyup', e => {
 keys[e.key] = false;
 });

 // Mobile controls
 const btnLeft = document.getElementById('btnLeft');
 const btnRight = document.getElementById('btnRight');
 const btnShoot = document.getElementById('btnShoot');

 // Touch screen control - tap left/right to move
 canvas.addEventListener('touchstart', e => {
 e.preventDefault();
 getAudioContext();
 const touch = e.touches[0];
 const rect = canvas.getBoundingClientRect();
 const x = touch.clientX - rect.left;
 if (x < rect.width / 2) {
 keys['ArrowLeft'] = true;
 } else {
 keys['ArrowRight'] = true;
 }
 });
 canvas.addEventListener('touchend', e => {
 e.preventDefault();
 keys['ArrowLeft'] = false;
 keys['ArrowRight'] = false;
 });
 canvas.addEventListener('touchmove', e => {
 e.preventDefault();
 const touch = e.touches[0];
 const rect = canvas.getBoundingClientRect();
 const x = touch.clientX - rect.left;
 keys['ArrowLeft'] = x < rect.width / 2;
 keys['ArrowRight'] = x >= rect.width / 2;
 });

 btnLeft.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
 btnLeft.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
 btnLeft.addEventListener('mousedown', () => keys['ArrowLeft'] = true);
 btnLeft.addEventListener('mouseup', () => keys['ArrowLeft'] = false);
 btnLeft.addEventListener('mouseleave', () => keys['ArrowLeft'] = false);

 btnRight.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
 btnRight.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
 btnRight.addEventListener('mousedown', () => keys['ArrowRight'] = true);
 btnRight.addEventListener('mouseup', () => keys['ArrowRight'] = false);
 btnRight.addEventListener('mouseleave', () => keys['ArrowRight'] = false);

 btnShoot.addEventListener('touchstart', e => { e.preventDefault(); getAudioContext(); shoot(); });
 btnShoot.addEventListener('mousedown', () => { getAudioContext(); shoot(); });

 const btnRestart = document.getElementById('btnRestart');
 btnRestart.addEventListener('touchstart', e => { e.preventDefault(); getAudioContext(); resetGame(); });
 btnRestart.addEventListener('mousedown', () => { getAudioContext(); resetGame(); });

 // Fullscreen toggle
 const fullscreenBtn = document.getElementById('fullscreenBtn');
 fullscreenBtn.addEventListener('click', () => {
 if (!document.fullscreenElement) {
 document.documentElement.requestFullscreen();
 } else {
 document.exitFullscreen();
 }
 });

 document.addEventListener('fullscreenchange', () => {
 const isFull = !!document.fullscreenElement;
 fullscreenBtn.textContent = isFull ? '⊠' : '⛶';
 canvas.style.width = isFull ? '100vw' : '';
 canvas.style.height = isFull ? '100vh' : '';
 canvas.style.maxWidth = isFull ? '100vw' : '';
 canvas.style.borderRadius = isFull ? '0' : '';
 canvas.style.borderLeft = isFull ? 'none' : '';
 canvas.style.borderRight = isFull ? 'none' : '';
 });

 resetGame();
 loop();
 </script>
</body>
</html>
