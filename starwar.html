<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
 <title>Star War</title>
 <style>
 * { box-sizing: border-box; }
 body { margin: 0; background: radial-gradient(circle at top, #0b1026 0%, #03050d 55%, #000 100%); color: #e8f1ff; font-family: Arial, Helvetica, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; }
 .wrap { width: min(95vw, 920px); text-align: center; }
 h1 { margin: 0 0 10px; letter-spacing: 3px; font-size: clamp(28px, 4vw, 44px); color: #8fd3ff; text-shadow: 0 0 14px rgba(143, 211, 255, 0.45); }
 p { margin: 8px 0 16px; color: #b5c8e8; }
 canvas { width: 720px; max-width: 720px; height: 480px; border: 2px solid rgba(143, 211, 255, 0.25); border-radius: 16px; background: linear-gradient(180deg, rgba(7,12,31,.95), rgba(0,0,0,1)); box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55), 0 0 30px rgba(88, 154, 255, 0.12); }
 .hud { display: flex; justify-content: space-between; gap: 12px; margin: 12px 0; flex-wrap: wrap; font-weight: bold; }
 .tag { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 8px 14px; min-width: 140px; }
 .accent { color: #7ef9a9; }
 .danger { color: #ff7f98; }
 .hint { font-size: 14px; opacity: .9; }
 .mobile-controls { display: none; margin-top: 16px; gap: 20px; justify-content: center; }
 @media (max-width: 600px) {
 .mobile-controls { display: flex; }
 .hint:not(.mobile-hint) { display: none; }
 .mobile-hint { display: block; }
 canvas { border-radius: 0; border-left: none; border-right: none; }
 }
 .ctrl-btn { width: 80px; height: 60px; font-size: 28px; background: rgba(255,255,255,0.1); border: 2px solid rgba(143, 211, 255, 0.4); border-radius: 12px; color: #8fd3ff; cursor: pointer; user-select: none; -webkit-user-select: none; }
 .ctrl-btn:active { background: rgba(143, 211, 255, 0.3); }
 .shoot-btn { width: 100px; height: 60px; font-size: 24px; background: rgba(126, 249, 169, 0.2); border: 2px solid rgba(126, 249, 169, 0.5); border-radius: 12px; color: #7ef9a9; }
 .shoot-btn:active { background: rgba(126, 249, 169, 0.4); }
 </style>
</head>
<body>
 <div class="wrap">
 <div class="hud" style="font-size:10px;">
 <div class="tag">Score: <span id="score" class="accent">0</span></div>
 <div class="tag">Lives: <span id="lives" class="danger">3</span></div>
 <div class="tag">Level: <span id="level">1</span></div>
 </div>
 <canvas id="game" width="720" height="480"></canvas>
 <p class="hint">Move with ← → or A D. Shoot with Space. Press R to restart.</p>
 <div class="mobile-controls">
 <button class="ctrl-btn" id="btnLeft">◀</button>
 <button class="shoot-btn" id="btnShoot">🔫</button>
 <button class="ctrl-btn" id="btnRight">▶</button>
 </div>
 <div class="bottom-controls">
 <button class="ctrl-btn" id="btnRestart" style="min-width:auto;padding:8px 16px;font-size:18px;">🔄</button>
 <a href="/" class="home-link" style="position:static;font-size:12px;padding:4px 8px;">🏠 Home</a>
 </div>
 <p class="hint">Tiny arcade chaos, maximum laser drama.</p>
 </div>
 <script>
 const canvas = document.getElementById('game');
 const ctx = canvas.getContext('2d');
 const scoreEl = document.getElementById('score');
 const livesEl = document.getElementById('lives');
 const levelEl = document.getElementById('level');
 const keys = {};
 let score = 0;
 let lives = 3;
 let level = 1;
 let gameOver = false;
 let restartCountdown = 0;
 let frame = 0;
 const stars = Array.from({ length: 140 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 0.4, speed: Math.random() * 1.8 + 0.2 }));
 const player = { x: canvas.width / 2 - 22, y: canvas.height - 70, w: 44, h: 44, speed: 6, cooldown: 0 };
 let bullets = [];
 let enemies = [];
 let enemyBullets = [];
 let particles = [];
 let enemyDirection = 1;
 function spawnWave() {
 enemies = [];
 const rows = Math.min(3 + level, 6);
 const cols = Math.min(7 + level, 12);
 const startX = 110;
 const startY = 70;
 const gapX = 58;
 const gapY = 48;
 for (let r = 0; r < rows; r++) {
 for (let c = 0; c < cols; c++) {
 enemies.push({ x: startX + c * gapX, y: startY + r * gapY, w: 30, h: 24, alive: true, type: (r + c) % 2 });
 }
 }
 }
 function resetGame() {
 score = 0;
 lives = 3;
 level = 1;
 gameOver = false;
 restartCountdown = 0;
 frame = 0;
 bullets = [];
 enemyBullets = [];
 particles = [];
 player.x = canvas.width / 2 - player.w / 2;
 player.cooldown = 0;
 enemyDirection = 1;
 spawnWave();
 updateHUD();
 }
 function updateHUD() {
 scoreEl.textContent = score;
 livesEl.textContent = lives;
 levelEl.textContent = level;
 }
 function shoot() {
 if (player.cooldown <= 0 && !gameOver) {
 bullets.push({ x: player.x + player.w / 2 - 2, y: player.y - 10, w: 4, h: 12, speed: 9 });
 player.cooldown = 14;
 }
 }
 function explode(x, y, color = '#8fd3ff', count = 14) {
 for (let i = 0; i < count; i++) {
 particles.push({ x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 28 + Math.random() * 18, color });
 }
 }
 function rectsCollide(a, b) {
 return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
 }
 function update() {
 frame++;
 if (gameOver) {
 restartCountdown--;
 if (restartCountdown <= 0) {
 resetGame();
 }
 return;
 }
 if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
 if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
 player.x = Math.max(12, Math.min(canvas.width - player.w - 12, player.x));
 if (player.cooldown > 0) player.cooldown--;
 bullets.forEach(b => b.y -= b.speed);
 bullets = bullets.filter(b => b.y + b.h > 0);
 const aliveEnemies = enemies.filter(e => e.alive);
 let moveDown = false;
 const enemySpeed = 0.4 + level * 0.12;
 for (const enemy of aliveEnemies) {
 enemy.x += enemyDirection * enemySpeed;
 if (enemy.x <= 18 || enemy.x + enemy.w >= canvas.width - 18) moveDown = true;
 }
 if (moveDown) {
 enemyDirection *= -1;
 for (const enemy of aliveEnemies) enemy.y += 18;
 }
 if (!gameOver && aliveEnemies.length && frame % Math.max(28, 85 - level * 6) === 0) {
 const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
 enemyBullets.push({ x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h, w: 4, h: 12, speed: 4 + level * 0.35 });
 }
 enemyBullets.forEach(b => b.y += b.speed);
 enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);
 for (const bullet of bullets) {
 for (const enemy of enemies) {
 if (enemy.alive && rectsCollide(bullet, enemy)) {
 enemy.alive = false;
 bullet.y = -999;
 score += 10;
 explode(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.type ? '#ff7f98' : '#ffe27a');
 updateHUD();
 break;
 }
 }
 }
 bullets = bullets.filter(b => b.y > -100);
 for (const bullet of enemyBullets) {
 if (rectsCollide(bullet, player)) {
 bullet.y = canvas.height + 999;
 lives--;
 explode(player.x + player.w / 2, player.y + player.h / 2, '#ff7f98', 22);
 updateHUD();
 if (lives <= 0) {
 gameOver = true;
 restartCountdown = 600; // 10 seconds at 60fps
 }
 }
 }
 enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 50);
 for (const enemy of enemies) {
 if (enemy.alive && enemy.y + enemy.h >= player.y) {
 gameOver = true;
 restartCountdown = 600;
 }
 }
 particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 1; });
 particles = particles.filter(p => p.life > 0);
 if (enemies.every(e => !e.alive)) {
 level++;
 enemyDirection = 1;
 bullets = [];
 enemyBullets = [];
 spawnWave();
 updateHUD();
 }
 stars.forEach(s => { s.y += s.speed; if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } });
 }
 function drawShip(x, y, w, h) {
 ctx.save();
 ctx.translate(x, y);
 ctx.beginPath();
 ctx.moveTo(w / 2, 0);
 ctx.lineTo(w, h);
 ctx.lineTo(w / 2, h * 0.72);
 ctx.lineTo(0, h);
 ctx.closePath();
 ctx.fillStyle = '#8fd3ff';
 ctx.fill();
 ctx.beginPath();
 ctx.moveTo(w / 2, 10);
 ctx.lineTo(w * 0.68, h * 0.58);
 ctx.lineTo(w * 0.32, h * 0.58);
 ctx.closePath();
 ctx.fillStyle = '#ffffff';
 ctx.fill();
 ctx.fillStyle = '#7ef9a9';
 ctx.fillRect(w * 0.18, h - 6, 8, 10);
 ctx.fillRect(w * 0.82 - 8, h - 6, 8, 10);
 ctx.restore();
 }
 function drawEnemy(e) {
 ctx.save();
 ctx.translate(e.x, e.y);
 ctx.fillStyle = e.type ? '#ff7f98' : '#ffe27a';
 ctx.fillRect(4, 8, e.w - 8, e.h - 10);
 ctx.fillRect(0, 12, 6, 8);
 ctx.fillRect(e.w - 6, 12, 6, 8);
 ctx.fillRect(8, 0, e.w - 16, 8);
 ctx.fillStyle = '#1c1c1c';
 ctx.fillRect(8, 12, 4, 4);
 ctx.fillRect(e.w - 12, 12, 4, 4);
 ctx.restore();
 }
 function draw() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 for (const s of stars) {
 ctx.globalAlpha = 0.5 + Math.random() * 0.5;
 ctx.fillStyle = '#ffffff';
 ctx.fillRect(s.x, s.y, s.size, s.size);
 }
 ctx.globalAlpha = 1;
 ctx.fillStyle = 'rgba(80, 150, 255, 0.08)';
 for (let i = 0; i < 6; i++) {
 ctx.beginPath();
 ctx.arc(120 + i * 150, -40, 120, 0, Math.PI * 2);
 ctx.fill();
 }
 drawShip(player.x, player.y, player.w, player.h);
 bullets.forEach(b => {
 ctx.fillStyle = '#7ef9a9';
 ctx.fillRect(b.x, b.y, b.w, b.h);
 });
 enemyBullets.forEach(b => {
 ctx.fillStyle = '#ff7f98';
 ctx.fillRect(b.x, b.y, b.w, b.h);
 });
 enemies.forEach(e => e.alive && drawEnemy(e));
 particles.forEach(p => {
 ctx.globalAlpha = Math.max(0, p.life / 40);
 ctx.fillStyle = p.color;
 ctx.fillRect(p.x, p.y, 3, 3);
 });
 ctx.globalAlpha = 1;
 if (gameOver) {
 ctx.fillStyle = 'rgba(0,0,0,0.55)';
 ctx.fillRect(0, 0, canvas.width, canvas.height);
 ctx.textAlign = 'center';
 ctx.fillStyle = '#ffffff';
 ctx.font = 'bold 54px Arial';
 ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 18);
 ctx.font = '24px Arial';
 ctx.fillStyle = '#b5c8e8';
 const seconds = Math.ceil(restartCountdown / 60);
 ctx.fillText('Restarting in ' + seconds + 's...', canvas.width / 2, canvas.height / 2 + 28);
 }
 }
 function loop() {
 if (!gameOver) update();
 draw();
 requestAnimationFrame(loop);
 }
 window.addEventListener('keydown', e => {
 if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); }
 keys[e.key] = true;
 if (e.key === ' ' || e.code === 'Space') { shoot(); }
 if ((e.key === 'r' || e.key === 'R') && gameOver) resetGame();
 });
 window.addEventListener('keyup', e => { keys[e.key] = false; });
 
 // Mobile controls
 const btnLeft = document.getElementById('btnLeft');
 const btnRight = document.getElementById('btnRight');
 const btnShoot = document.getElementById('btnShoot');
 
 btnLeft.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
 btnLeft.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
 btnLeft.addEventListener('mousedown', () => keys['ArrowLeft'] = true);
 btnLeft.addEventListener('mouseup', () => keys['ArrowLeft'] = false);
 
 btnRight.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
 btnRight.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
 btnRight.addEventListener('mousedown', () => keys['ArrowRight'] = true);
 btnRight.addEventListener('mouseup', () => keys['ArrowRight'] = false);
 
 btnShoot.addEventListener('touchstart', e => { e.preventDefault(); shoot(); });
 btnShoot.addEventListener('mousedown', () => shoot());
 
 resetGame();
 loop();
 </script>
</body>
</html>
