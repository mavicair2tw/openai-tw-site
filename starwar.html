<!DOCTYPE html>
<html>
<head>
<title>Star War</title>
</head>
<body style="background:black;color:white;font-family:Arial;text-align:center;">
<h1>Star War</h1>
<canvas id="c" width="400" height="400" style="border:2px solid cyan;background:#000;"></canvas>
<script>
var c=document.getElementById('c');
var x=c.getContext('2d');
x.fillStyle='red';
x.fillRect(50,50,100,50);
x.fillStyle='lime';
x.fillRect(200,300,50,50);
document.onkeydown=function(e){x.fillStyle='yellow';x.fillRect(180,350,30,30);};
</script>
<p>Press any key</p>
</body>
</html>
