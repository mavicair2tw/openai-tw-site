<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETF 投資工具 — openai-tw.com</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #0a1226;
      --panel: #121a2f;
      --panel2: #0f1728;
      --line: #253252;
      --line2: #1e2d4a;
      --text: #e6edf3;
      --muted: #9fb0c3;
      --accent: #60a5fa;
      --accent2: #3b82f6;
      --green: #34d399;
      --green-bg: #052e16;
      --green-border: #064e2a;
      --green-text: #6ee7b7;
      --blue-bg: #0c1f3f;
      --blue-border: #1e3a6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-size: 15px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; }

    /* ── Header ── */
    .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .logo { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 10px; border: 1px solid #35558d; background: linear-gradient(135deg,#132547,#1c3563); color: #dbeafe; font-weight: 800; font-size: 13px; text-decoration: none; }
    .nav-links { display: flex; gap: 12px; }
    .nav-links a { color: var(--accent); text-decoration: none; font-size: 13px; }
    .nav-links a:hover { text-decoration: underline; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; background: linear-gradient(90deg,#fff 0%,#b7d0ff 50%,#8ab4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
    .tab-btn { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--muted); font-weight: 500; transition: all .15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Cards ── */
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; }
    .card-sm { background: var(--panel2); border-radius: 8px; padding: 12px 14px; }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }

    /* ── Labels ── */
    .sec-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .muted { color: var(--muted); font-size: 13px; }
    .divider { border: none; border-top: 1px solid var(--line2); margin: 14px 0; }

    /* ── Inputs ── */
    input[type=range] { width: 100%; accent-color: var(--accent2); cursor: pointer; }
    .input-row { display: flex; align-items: center; gap: 10px; }
    .input-row input[type=range] { flex: 1; }
    .num-val { font-size: 14px; font-weight: 600; min-width: 70px; text-align: right; color: var(--accent); }
    input[type=checkbox] { accent-color: var(--accent2); width: 15px; height: 15px; cursor: pointer; }

    /* ── Buttons ── */
    .btn { padding: 6px 14px; font-size: 13px; border-radius: 6px; border: 1px solid var(--line); background: transparent; color: var(--text); cursor: pointer; transition: all .12s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.active-btn { border-color: var(--accent2); background: var(--blue-bg); color: var(--accent); }
    .btn-sm { padding: 3px 10px; font-size: 12px; border-radius: 5px; border: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; transition: all .12s; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .ai-btn { padding: 7px 16px; font-size: 13px; border-radius: 6px; border: 1px solid #35558d; background: linear-gradient(135deg,#132547,#1c3563); color: #93c5fd; cursor: pointer; font-weight: 600; }
    .ai-btn:hover { border-color: var(--accent); }

    /* ── Result numbers ── */
    .result-big { font-size: 26px; font-weight: 700; color: var(--text); margin: 4px 0; }
    .val-md { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 3px; }
    .stat-val { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px; }

    /* ── Badges ── */
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
    .badge-blue { background: var(--blue-bg); color: #93c5fd; border: 1px solid var(--blue-border); }
    .tb { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .tb-high { background: #052e16; color: #6ee7b7; }
    .tb-broad { background: #0c1f3f; color: #93c5fd; }
    .tb-tech { background: #2d1a05; color: #fcd34d; }
    .tb-esg { background: #1e0738; color: #c4b5fd; }

    /* ── ETF selector chips ── */
    .etf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .etf-chip { border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px; cursor: pointer; transition: all .15s; }
    .etf-chip:hover { border-color: var(--accent2); }
    .etf-chip.on { border-color: var(--accent2); background: var(--blue-bg); }
    .chip-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .chip-check { width: 17px; height: 17px; border-radius: 4px; border: 1px solid var(--line); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .12s; }
    .etf-chip.on .chip-check { background: var(--accent2); border-color: var(--accent2); }
    .chip-tag-row { display: flex; gap: 6px; align-items: center; font-size: 12px; margin-top: 5px; }
    .yield-val { font-weight: 700; color: var(--accent); }

    /* ── Alloc bar ── */
    .alloc-bar { height: 4px; border-radius: 2px; background: var(--line); overflow: hidden; margin-top: 5px; }
    .alloc-fill { height: 100%; border-radius: 2px; transition: width .4s; }

    /* ── Compare table ── */
    .cmp-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .cmp-table th { font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    .cmp-table td { padding: 10px 8px; border-bottom: 1px solid var(--line2); vertical-align: middle; }
    .cmp-table tr:last-child td { border-bottom: none; }
    .cmp-table tr.dim td { opacity: .3; }
    .cmp-table tr.hl td { background: rgba(59,130,246,.06); }
    .tag-pill { font-size: 11px; background: var(--panel2); color: var(--muted); padding: 2px 7px; border-radius: 999px; border: 1px solid var(--line2); }
    .top-badge { font-size: 10px; margin-left: 5px; padding: 1px 5px; border-radius: 3px; background: var(--green-bg); color: var(--green-text); font-weight: 600; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }

    /* ── Footer links ── */
    .foot { margin-top: 32px; color: var(--muted); font-size: 13px; }
    .foot a { color: var(--accent); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .tab-btn { padding: 8px 12px; font-size: 13px; }
      .result-big { font-size: 22px; }
      .wrap { padding: 18px 14px 40px; }
    }
  </style>
</head>
<body>
<main class="wrap">
  <div class="top-bar">
    <a class="logo" href="/">openai-tw.com</a>
    <div class="nav-links">
      <a href="/stock-search/">股市</a>
      <a href="/chat/">Chat</a>
      <a href="/">首頁</a>
    </div>
  </div>

  <h1>ETF 投資工具</h1>
  <p class="subtitle">配息試算 · 投資組合分析 · ETF 比較</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('calc',this)">配息試算</button>
    <button class="tab-btn" onclick="setTab('portfolio',this)">投資組合</button>
    <button class="tab-btn" onclick="setTab('compare',this)">ETF 比較</button>
  </div>

  <div id="tab-content"></div>

  <div class="foot">資料僅供參考，不構成投資建議。 · <a href="/">返回首頁</a></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ETFS = [
  { code:'0056',   name:'元大高股息',      type:'高股息', tc:'tb-high',  yield:5.2, fee:0.34, freq:'季配', aumN:2650, aum:'2,650億' },
  { code:'00878',  name:'國泰永續高股息',   type:'ESG',   tc:'tb-esg',   yield:4.8, fee:0.27, freq:'季配', aumN:1420, aum:'1,420億' },
  { code:'00929',  name:'復華台灣科技優息', type:'科技',   tc:'tb-tech',  yield:6.1, fee:0.39, freq:'月配', aumN:380,  aum:'380億'  },
  { code:'006208', name:'富邦台50',         type:'寬基',   tc:'tb-broad', yield:2.8, fee:0.04, freq:'半年', aumN:920,  aum:'920億'  },
  { code:'00919',  name:'群益台灣精選高息', type:'高股息', tc:'tb-high',  yield:6.8, fee:0.43, freq:'月配', aumN:2100, aum:'2,100億'},
  { code:'0050',   name:'元大台灣50',       type:'寬基',   tc:'tb-broad', yield:2.5, fee:0.03, freq:'半年', aumN:4200, aum:'4,200億'},
  { code:'0052',   name:'富邦科技',         type:'科技',   tc:'tb-tech',  yield:1.8, fee:0.31, freq:'半年', aumN:210,  aum:'210億'  },
];
const COLS = ['#3b82f6','#34d399','#f59e0b','#f87171','#a78bfa','#22d3ee','#fb7185'];

let activeTab = 'calc';
let selected = new Set(ETFS.map(e => e.code));
let calcFreq = 'quarter';
let growthChart = null, pieChart = null;

function fmtInv(v) {
  if (v >= 1e7) return (v/1e7).toFixed(1) + '千萬';
  if (v >= 1e6) return (v/1e6).toFixed(1) + '百萬';
  return (v/1e4).toFixed(0) + '萬';
}
function fmtN(n) { return Math.round(n).toLocaleString('zh-TW'); }

/* ── Tab switching ── */
function setTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}
function renderTab() {
  const el = document.getElementById('tab-content');
  if (activeTab === 'calc')      { el.innerHTML = calcHTML();      initCalc(); }
  if (activeTab === 'portfolio') { el.innerHTML = portfolioHTML(); initPie();  }
  if (activeTab === 'compare')   { el.innerHTML = compareHTML();               }
}

/* ══════════════════════════════════════════
   TAB 1 — 配息試算
══════════════════════════════════════════ */
function calcHTML() {
  const freqBtns = [['quarter','季配'],['month','月配'],['year','年配']].map(([v,l]) =>
    `<button class="btn ${calcFreq===v?'active-btn':''}" onclick="setFreq('${v}')">${l}</button>`
  ).join('');
  return `
<div class="grid2" style="margin-bottom:14px;">
  <div class="card">
    <div class="sec-label">參數設定</div>
    <div style="margin-bottom:14px;">
      <div class="muted" style="margin-bottom:6px;">投資金額</div>
      <div class="input-row">
        <input id="c-inv" type="range" min="100000" max="10000000" step="100000" value="1000000" oninput="updateCalc()">
        <span id="c-inv-v" class="num-val">100萬</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px;">NT$ <span id="c-inv-exact">1,000,000</span></div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="muted" style="margin-bottom:6px;">年化殖利率</div>
      <div class="input-row">
        <input id="c-yld" type="range" min="1" max="12" step="0.1" value="5" oninput="updateCalc()">
        <span id="c-yld-v" class="num-val">5.0%</span>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="muted" style="margin-bottom:6px;">投資年期</div>
      <div class="input-row">
        <input id="c-yrs" type="range" min="1" max="40" step="1" value="20" oninput="updateCalc()">
        <span id="c-yrs-v" class="num-val">20年</span>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="muted" style="margin-bottom:8px;">配息頻率</div>
      <div style="display:flex;gap:8px;">${freqBtns}</div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);">
      <input id="c-ri" type="checkbox" checked onchange="updateCalc()"> 配息再投入（複利）
    </label>
  </div>
  <div class="card">
    <div class="sec-label">試算結果</div>
    <div style="margin-bottom:14px;">
      <div class="muted">每期配息</div>
      <div id="r-per" class="result-big">NT$ 12,500</div>
      <div id="r-note" class="muted">每季一次</div>
    </div>
    <hr class="divider">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div><div class="muted">年度配息</div><div id="r-ann" class="val-md">—</div></div>
      <div><div class="muted">月均等效</div><div id="r-mon" class="val-md">—</div></div>
    </div>
    <hr class="divider">
    <div>
      <div class="muted" style="margin-bottom:4px;">期末資產</div>
      <div id="r-fut" class="result-big" style="font-size:22px;">—</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px;">
        <span class="muted">總收益 <span id="r-gain" style="color:var(--green);font-weight:600;"></span></span>
        <span id="r-roi" class="badge badge-green"></span>
      </div>
    </div>
  </div>
</div>
<div class="card">
  <div class="sec-label" style="margin-bottom:10px;">資產成長曲線</div>
  <div style="position:relative;height:220px;"><canvas id="growthChart"></canvas></div>
</div>`;
}

function setFreq(v) { calcFreq = v; renderTab(); }
function initCalc() { updateCalc(); }

function updateCalc() {
  const inv = +document.getElementById('c-inv').value;
  const yld = +document.getElementById('c-yld').value / 100;
  const yrs = +document.getElementById('c-yrs').value;
  const ri  = document.getElementById('c-ri').checked;
  const pY  = inv * yld;
  let pp, note;
  if (calcFreq === 'month')    { pp = pY/12; note = '每月一次'; }
  else if (calcFreq === 'quarter') { pp = pY/4;  note = '每季一次'; }
  else                         { pp = pY;    note = '每年一次'; }

  document.getElementById('c-inv-v').textContent     = fmtInv(inv);
  document.getElementById('c-inv-exact').textContent = inv.toLocaleString();
  document.getElementById('c-yld-v').textContent     = (yld*100).toFixed(1) + '%';
  document.getElementById('c-yrs-v').textContent     = yrs + '年';
  document.getElementById('r-per').textContent       = 'NT$ ' + fmtN(pp);
  document.getElementById('r-note').textContent      = note;
  document.getElementById('r-ann').textContent       = 'NT$ ' + fmtN(pY);
  document.getElementById('r-mon').textContent       = 'NT$ ' + fmtN(pY/12);

  const labels = [], data = [], base = [];
  for (let y = 0; y <= yrs; y++) {
    labels.push(y + '年');
    data.push(Math.round(ri ? inv * Math.pow(1+yld, y) : inv + pY * y));
    base.push(inv);
  }
  const fv = data[data.length-1];
  document.getElementById('r-fut').textContent  = 'NT$ ' + fmtN(fv);
  document.getElementById('r-gain').textContent = 'NT$ ' + fmtN(fv - inv);
  document.getElementById('r-roi').textContent  = '+' + (((fv-inv)/inv)*100).toFixed(1) + '%';

  if (growthChart) growthChart.destroy();
  growthChart = new Chart(document.getElementById('growthChart'), {
    type: 'line',
    data: { labels, datasets: [
      { data, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: .4, pointRadius: 0, borderWidth: 2 },
      { data: base, borderColor: '#4b5563', borderDash: [4,3], fill: false, tension: 0, pointRadius: 0, borderWidth: 1.5 }
    ]},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => 'NT$ ' + c.raw.toLocaleString() } } },
      scales: {
        x: { ticks: { font:{size:11}, color:'#6b7280', autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { font:{size:11}, color:'#6b7280', callback: v => v>=1e7?(v/1e7).toFixed(1)+'千萬':v>=1e6?(v/1e6).toFixed(1)+'M':(v/1e4).toFixed(0)+'萬' }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

/* ══════════════════════════════════════════
   TAB 2 — 投資組合
══════════════════════════════════════════ */
function portfolioHTML() {
  const selList = ETFS.filter(e => selected.has(e.code));
  const w = selList.length > 0 ? parseFloat((100/selList.length).toFixed(1)) : 0;
  const wY = selList.reduce((s,e) => s + w/100*e.yield, 0);
  const wF = selList.reduce((s,e) => s + w/100*e.fee, 0);
  const mp = selList.filter(e => e.freq==='月配').reduce((s,e) => s+w, 0);

  const chips = ETFS.map(e => {
    const on = selected.has(e.code);
    return `<div class="etf-chip ${on?'on':''}" onclick="doToggle('${e.code}')">
      <div class="chip-header">
        <div>
          <span style="font-weight:700;font-size:14px;">${e.code}</span>
          <span class="tb ${e.tc}" style="margin-left:5px;">${e.type}</span>
        </div>
        <div class="chip-check">
          ${on ? '<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:5px;">${e.name}</div>
      <div class="chip-tag-row">
        <span class="yield-val">${e.yield}%</span>
        <span class="tag-pill">${e.freq}</span>
        <span style="color:var(--muted);font-size:11px;">${e.fee}%</span>
      </div>
    </div>`;
  }).join('');

  const allocRows = selList.map((e,i) => `
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line2);">
      <div>
        <div style="font-weight:700;font-size:14px;">${e.code} <span class="tb ${e.tc}">${e.type}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px;">${e.name}</div>
        <div class="alloc-bar"><div class="alloc-fill" style="width:${w}%;background:${COLS[i%COLS.length]};"></div></div>
      </div>
      <div style="font-size:17px;font-weight:700;">${w.toFixed(1)}<span style="font-size:12px;color:var(--muted);">%</span></div>
      <div><span class="badge badge-blue">${e.yield}%</span></div>
    </div>
  `).join('');

  return `
<div class="card" style="margin-bottom:14px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
    <div class="sec-label" style="margin-bottom:0;">選擇 ETF（單選 / 複選）</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn-sm" onclick="doSelAll()">全選</button>
      <button class="btn-sm" onclick="doSelClear()">清除</button>
      <button class="btn-sm" onclick="doSelType('高股息')">高股息</button>
      <button class="btn-sm" onclick="doSelType('寬基')">寬基</button>
      <button class="btn-sm" onclick="doSelType('科技')">科技</button>
    </div>
  </div>
  <div class="etf-grid">${chips}</div>
  <div style="margin-top:8px;font-size:12px;color:var(--muted);">已選 ${selected.size} 檔${selected.size===1?' · 單選模式':selected.size>1?' · 複選模式':''}</div>
</div>

${selList.length === 0
  ? `<div class="empty">請至少選擇一檔 ETF 來建立組合</div>`
  : `
<div class="grid2" style="margin-bottom:14px;">
  <div class="card">
    <div class="sec-label">持倉配置（均等權重）</div>
    ${allocRows}
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="ai-btn" onclick="sendAI('分析組合')">AI 分析建議 ↗</button>
      <button class="ai-btn" onclick="sendAI('預估收益')">預估年收益 ↗</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-label">配置圓餅圖</div>
    <div style="position:relative;height:210px;"><canvas id="pieChart"></canvas></div>
    <div id="pie-leg" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:12px;"></div>
  </div>
</div>
<div class="grid4">
  ${[['持有檔數',selList.length+'檔'],['加權殖利率',wY.toFixed(2)+'%'],['加權費用率',wF.toFixed(3)+'%'],['月配佔比',mp.toFixed(0)+'%']].map(([l,v])=>`
    <div class="card-sm">
      <div style="font-size:12px;color:var(--muted);">${l}</div>
      <div class="stat-val">${v}</div>
    </div>`).join('')}
</div>`}`;
}

function doToggle(code) { selected.has(code) ? selected.delete(code) : selected.add(code); renderTab(); }
function doSelAll()   { ETFS.forEach(e => selected.add(e.code));    renderTab(); }
function doSelClear() { selected.clear();                            renderTab(); }
function doSelType(type) {
  const codes = ETFS.filter(e => e.type === type).map(e => e.code);
  const allOn = codes.every(c => selected.has(c));
  codes.forEach(c => allOn ? selected.delete(c) : selected.add(c));
  renderTab();
}

function sendAI(mode) {
  const codes = [...selected].join('、');
  const msg = mode === '分析組合'
    ? `幫我分析這個ETF組合：${codes}，各有什麼優缺點？風險如何？`
    : `如果投資100萬在這個組合（${codes}）均等配置，每年預估可以領多少配息？`;
  window.open(`/chat/?q=${encodeURIComponent(msg)}`, '_blank');
}

function initPie() {
  const selList = ETFS.filter(e => selected.has(e.code));
  if (!selList.length) return;
  const w = 100 / selList.length;
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: selList.map(e => e.code), datasets: [{ data: selList.map(() => w), backgroundColor: COLS.slice(0, selList.length), borderWidth: 2, borderColor: '#121a2f' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '58%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.label + ': ' + w.toFixed(1) + '%' } } } }
  });
  document.getElementById('pie-leg').innerHTML = selList.map((e,i) =>
    `<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${COLS[i%COLS.length]};display:inline-block;"></span><span style="color:var(--muted);">${e.code} ${w.toFixed(1)}%</span></span>`
  ).join('');
}

/* ══════════════════════════════════════════
   TAB 3 — ETF 比較
══════════════════════════════════════════ */
function compareHTML() {
  const maxY = Math.max(...ETFS.map(e => e.yield));
  const minF = Math.min(...ETFS.map(e => e.fee));
  const rows = ETFS.map(e => {
    const on = selected.has(e.code), topY = e.yield===maxY, lowF = e.fee===minF;
    return `<tr class="${!on?'dim':topY?'hl':''}">
      <td><strong style="font-size:14px;">${e.code}</strong></td>
      <td>${e.name}</td>
      <td><span class="tb ${e.tc}">${e.type}</span></td>
      <td><span style="font-weight:700;color:${topY?'var(--green)':'var(--text)'};">${e.yield}%</span>${topY?'<span class="top-badge">最高</span>':''}</td>
      <td><span style="color:${lowF?'var(--green)':'var(--text)'};">${e.fee}%</span>${lowF?'<span class="top-badge">最低</span>':''}</td>
      <td><span class="tag-pill">${e.freq}</span></td>
      <td style="color:var(--muted);">${e.aum}</td>
    </tr>`;
  }).join('');

  return `
<div class="card" style="margin-bottom:14px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
    <div class="sec-label" style="margin-bottom:0;">ETF 比較表</div>
    <div style="font-size:12px;color:var(--muted);">在「投資組合」頁籤選取後可高亮顯示</div>
  </div>
  <div style="overflow-x:auto;">
    <table class="cmp-table">
      <thead><tr>
        <th>代號</th><th>名稱</th><th>類型</th><th>殖利率</th><th>費用率</th><th>配息</th><th>規模</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;">
  <button class="ai-btn" onclick="window.open('/chat/?q='+encodeURIComponent('0050和0052的差異是什麼？哪個更適合長期投資？'),'_blank')">0050 vs 0052 ↗</button>
  <button class="ai-btn" onclick="window.open('/chat/?q='+encodeURIComponent('00919和00929都是月配息ETF，哪個比較好？'),'_blank')">00919 vs 00929 ↗</button>
  <button class="ai-btn" onclick="window.open('/chat/?q='+encodeURIComponent('這7檔ETF如何搭配成攻守兼備的投資組合？'),'_blank')">AI 組合建議 ↗</button>
</div>`;
}

/* ── Init ── */
renderTab();
</script>
</body>
</html>
